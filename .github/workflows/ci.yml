name: ci

on:
  push:
    branches: [main]

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install -e .[dev]
      - run: ruff check src tests
      - run: mypy src

  test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e .[dev]
      - run: pytest

  build-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: pip install build twine pytest
      - run: rm -rf dist build src/typing_refined/_version.py

      - run: python -m build
      - run: twine check dist/*

      - run: python -m venv venv-whl
      - run: venv-whl/bin/pip install --quiet --upgrade pip
      - run: venv-whl/bin/pip install --quiet --no-deps dist/*.whl
      - run: venv-whl/bin/pip install --quiet pytest
      - name: pytest against installed wheel
        working-directory: ${{ runner.temp }}
        env:
          PYTHONPATH: ""
        run: |
          ln -s "$GITHUB_WORKSPACE/tests" tests
          "$GITHUB_WORKSPACE/venv-whl/bin/python" -m pytest tests/ -v

      - run: python -m venv venv-sdist
      - run: venv-sdist/bin/pip install --quiet --upgrade pip
      - run: venv-sdist/bin/pip install --quiet --no-deps dist/*.tar.gz
      - run: venv-sdist/bin/pip install --quiet pytest
      - name: pytest against installed sdist
        working-directory: ${{ runner.temp }}
        env:
          PYTHONPATH: ""
        run: |
          ln -s "$GITHUB_WORKSPACE/tests" tests
          "$GITHUB_WORKSPACE/venv-sdist/bin/python" -m pytest tests/ -v
