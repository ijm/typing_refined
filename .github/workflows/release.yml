name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to publish to'
        required: true
        type: choice
        options:
          - pypi-test
          - pypi

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # setuptools_scm needs full history to read the tag

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - run: pip install --upgrade pip build twine

      - run: python -m build

      - run: twine check dist/*

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write  # OIDC for trusted publishing; no API token needed
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        if: inputs.environment == 'pypi-test'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: inputs.environment == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1
